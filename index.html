<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة IELTS Interactive | الدخول الحصري</title>
    <style>
        /* تصميم الواجهة المستوحى من البوستر */
        body {
            background: radial-gradient(circle, #001f3f 0%, #000b1a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #d4af37; /* اللون الذهبي */
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 { color: #d4af37; margin-bottom: 10px; font-size: 24px; }
        p { color: #ccc; margin-bottom: 30px; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #001529;
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #d4af37, #f2d06b);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .cefr-badge {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div style="font-size: 40px; margin-bottom: 10px;">🎓</div>
    <h1>IELTS Interactive</h1>
    <p>أدخل كود الوصول الحصري الخاص بك للبدء</p>
    
    <input type="password" id="accessCode" placeholder="أدخل كلمة السر">
    <button onclick="validateAccess()">دخول المنصة</button>

    <div class="cefr-badge">CEFR ALIGNMENT A1 TO C2</div>
</div>

<script>
    function validateAccess() {
        const code = document.getElementById('accessCode').value.trim();

        // منطق توزيع الطلاب بناءً على الكود (المستوى)
        // يمكنك تغيير الروابط أدناه لروابط الفيديوهات الخاصة بك
        if (code === "IELTS-A1") {
            alert("مرحباً بك! يتم توجيهك لمحتوى التأسيس (A1-A2)");
            window.location.href = "https://your-video-link-A1.com";
        } 
        else if (code === "IELTS-B1") {
            alert("مرحباً بك! يتم توجيهك للمستوى المتوسط (B1-B2)");
            window.location.href = "https://your-video-link-B1.com";
        } 
        else if (code === "IELTS-PRO") {
            alert("مرحباً بك! يتم توجيهك لمستوى الاحتراف والاستراتيجيات (C1-C2)");
            window.location.href = "https://your-video-link-C1.com";
        } 
        else {
            alert("الكود غير صحيح. يرجى مراجعة المشرف الخاص بك.");
        }
    }
</script>

</body>
</html>
