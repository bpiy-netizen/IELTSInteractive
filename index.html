<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية د. مصطفى IELTS - Elite Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4158D0;
            --secondary: #C850C0;
            --tertiary: #FFCC70;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            margin: 0; padding: 0;
            background: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #f3f4f7 0%, #e2ebf0 100%);
            min-height: 100vh;
        }

        /* هيدر سينمائي */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 0 0 80px 80px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: ""; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .container { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; position: relative; z-index: 10; }

        /* البطاقات السريعة */
        .stats {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: white; padding: 15px 30px; border-radius: 50px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
            font-weight: bold; color: var(--primary);
        }

        /* شبكة المهارات */
        .skills-nav {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px;
        }
        .skill-card {
            background: white; border: none; padding: 30px 15px; border-radius: 30px;
            cursor: pointer; transition: 0.4s; box-shadow: var(--shadow);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .skill-card i { font-size: 2.2rem; background: linear-gradient(var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .skill-card span { font-weight: 800; font-size: 1.1rem; color: #444; }
        .skill-card:hover, .skill-card.active { transform: translateY(-12px); background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .skill-card:hover i, .skill-card:hover span, .skill-card.active i, .skill-card.active span { color: white; -webkit-text-fill-color: white; }

        /* منطقة الدروس */
        .lesson-section {
            background: var(--glass); border-radius: 40px; padding: 40px;
            display: none; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.3);
        }
        .lesson-section.active { display: block; animation: zoomIn 0.5s ease; }

        .lesson-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 25px; background: white; border-radius: 20px;
            margin-bottom: 15px; border: 1px solid #eee; cursor: pointer; transition: 0.3s;
        }
        .lesson-row:hover { background: #fdf6ff; border-color: var(--secondary); transform: scale(1.02); }

        .btn-play {
            background: var(--primary); color: white; width: 40px; height: 40px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }

        /* نافذة الفيديو المودرن */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; z-index: 1000;
            align-items: center; justify-content: center;
        }
        .video-box { width: 90%; max-width: 900px; position: relative; }
        video { width: 100%; border-radius: 30px; box-shadow: 0 0 50px rgba(65, 88, 208, 0.4); }
        .close-btn { position: absolute; top: -60px; right: 0; color: white; font-size: 1.5rem; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        @media (max-width: 768px) { .skills-nav { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <h1 id="greeting">أكاديمية IELTS Elite</h1>
    <p>مستقبلك يبدأ هنا مع د. مصطفى</p>
</header>

<div class="container">
    <div class="stats">
        <div class="stat-item"><i class="fas fa-check-circle"></i> <span id="progressText">أهلاً بك يا بطل</span></div>
        <div class="stat-item"><i class="fas fa-calendar-day"></i> <span id="currentDate"></span></div>
    </div>

    <div class="skills-nav">
        <button class="skill-card active" onclick="tab('listening', this)"><i class="fas fa-headphones"></i><span>الاستماع</span></button>
        <button class="skill-card" onclick="tab('reading', this)"><i class="fas fa-book-open"></i><span>القراءة</span></button>
        <button class="skill-card" onclick="tab('writing', this)"><i class="fas fa-feather-alt"></i><span>الكتابة</span></button>
        <button class="skill-card" onclick="tab('speaking', this)"><i class="fas fa-comment-dots"></i><span>المحادثة</span></button>
    </div>

    <div id="listening" class="lesson-section active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="margin:0; color:#333;">مكتبة الاستماع الذهبية</h2>
            <span style="background:#e8f0fe; color:var(--primary); padding:5px 15px; border-radius:10px; font-weight:bold;">2 دروس متاحة</span>
        </div>
        
        <div class="lesson-row" onclick="watch('L1', 'final projet 1.mov', 'الدرس الأول: رحلة الـ 8.5 تبدأ من هنا')">
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="btn-play"><i class="fas fa-play"></i></div>
                <div>
                    <strong style="display:block; font-size:1.1rem;">مرحباً بك في المنصة (تجريبي)</strong>
                    <small style="color:#888;">استعراض ميزات الموقع والدروس</small>
                </div>
            </div>
            <i class="fas fa-chevron-left" style="color:#ccc;"></i>
        </div>
    </div>

    <div id="reading" class="lesson-section"><h2 style="text-align:center; color:#999; padding:50px;">سيتم رفع دروس القراءة قريباً...</h2></div>
    <div id="writing" class="lesson-section"><h2 style="text-align:center; color:#999; padding:50px;">سيتم رفع دروس الكتابة قريباً...</h2></div>
    <div id="speaking" class="lesson-section"><h2 style="text-align:center; color:#999; padding:50px;">سيتم رفع دروس المحادثة قريباً...</h2></div>
</div>

<div class="overlay" id="videoOverlay">
    <div class="video-box">
        <div class="close-btn" onclick="stop()"><i class="fas fa-times"></i> إغلاق المشغل</div>
        <video id="player" controls playsinline></video>
        <h3 id="vTitle" style="color:white; text-align:center; margin-top:20px; font-weight:300;"></h3>
    </div>
</div>

<script>
    // ترحيب ذكي حسب الوقت
    const hour = new Date().getHours();
    const greet = hour < 12 ? "صباح الخير يا دكتور مصطفى" : "مساء النجاح يا دكتور مصطفى";
    document.getElementById('greeting').innerText = greet;
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});

    function tab(id, btn) {
        document.querySelectorAll('.lesson-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.skill-card').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function watch(folder, file, title) {
        const url = `https://res.cloudinary.com/dr3i6fqai/video/upload/f_auto,q_auto/${folder}/${file}`;
        document.getElementById('vTitle').innerText = title;
        document.getElementById('player').src = url;
        document.getElementById('videoOverlay').style.display = 'flex';
        document.getElementById('player').play();
    }

    function stop() {
        document.getElementById('videoOverlay').style.display = 'none';
        document.getElementById('player').pause();
    }
</script>

</body>
</html>
