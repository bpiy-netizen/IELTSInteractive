<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root {
            --primary: #000a14;
            --sidebar: #001226;
            --gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: var(--primary); color: white;
            display: flex; height: 100vh; overflow: hidden;
        }
        /* القائمة الجانبية */
        .sidebar {
            width: 350px; background: var(--sidebar);
            border-left: 1px solid rgba(197, 160, 89, 0.2);
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        .sidebar-header img { max-width: 180px; }

        .lessons-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .lesson-item {
            background: var(--glass); padding: 15px; border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; border: 1px solid transparent;
        }
        .lesson-item:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }
        .lesson-item.active { background: var(--gold); color: black; font-weight: bold; }

        /* منطقة العرض */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; }
        .details { padding: 40px; }
        .details h1 { color: var(--gold); font-size: 2rem; margin: 0; }
        .details p { color: #888; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="IELTS Academy">
        </div>
        <div class="lessons-list">
            <div class="lesson-item active" onclick="changeVideo('رابط_فيديو_Cloudinary_هنا', 'مقدمة الأكاديمية', 'كلمة ترحيبية من د. مصطفى مكاحلة', this)">
                <i class="fas fa-play-circle"></i>
                <span>1. المقدمة والترحيب</span>
            </div>
            </div>
    </aside>

    <main class="main-content">
        <div class="video-container">
            <video id="mainPlayer" controls controlsList="nodownload">
                <source id="vSource" src="رابط_فيديو_Cloudinary_هنا" type="video/mp4">
            </video>
        </div>
        <div class="details">
            <h1 id="vTitle">مرحباً بك في أكاديمية IELTS</h1>
            <p id="vDesc">دورة الآيلتس المكثفة - إشراف د. مصطفى مكاحلة</p>
        </div>
    </main>

    <script>
        function changeVideo(url, title, desc, element) {
            const video = document.getElementById('mainPlayer');
            const source = document.getElementById('vSource');
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            source.src = url;
            document.getElementById('vTitle').innerText = title;
            document.getElementById('vDesc').innerText = desc;
            video.load();
            video.play();
        }
    </script>
</body>
</html>
