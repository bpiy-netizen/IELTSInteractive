<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Premium Platform</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #050a14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 95%; max-width: 1150px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 30px; }
        .video-card { background: #0a111f; border-radius: 20px; overflow: hidden; border: 1px solid #1a2436; transition: 0.3s; position: relative; }
        .video-card:hover { border-color: #d4af37; transform: translateY(-5px); }
        h1 { color: #d4af37; font-size: 2.2em; margin-bottom: 10px; }
        .input-box { width: 100%; max-width: 350px; padding: 15px; border-radius: 12px; border: 1px solid #1a2436; background: #0f172a; color: #fff; text-align: center; margin-bottom: 20px; outline: none; font-size: 16px; }
        .btn { padding: 14px 40px; background: #d4af37; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: #000; font-size: 16px; transition: 0.3s; }
        .hidden { display: none; }
        :root { --plyr-color-main: #d4af37; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h1>IELTS Expert Portal</h1>
        <p style="color: #8892b0; margin-bottom: 30px;">نخبة الدروس بلكنة أصلية (Native Accent) - مستوى A1</p>
        <input type="password" id="pass" class="input-box" placeholder="أدخل الكود (A1-LISTENING)">
        <br>
        <button class="btn" onclick="access()">دخول المنصة</button>
    </div>

    <div id="contentSection" class="hidden">
        <h2 id="skillTitle" style="color:#d4af37"></h2>
        <div class="grid-videos" id="videoGrid"></div>
        <br><br>
        <button class="btn" onclick="location.reload()" style="background:#1a2436; color:#fff;">العودة للرئيسية</button>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    // تم اختيار فيديوهات مفتوحة للتشغيل الخارجي 100% من معلمين ناطقين بالإنجليزية كأصل
    const database = {
        "A1-LISTENING": { 
            title: "Expert Listening Practice", 
            videos: ["K6X4p9nUfI0", "hS_W_O86YDs", "VpU369S2W6E", "LNr_m1V74zM", "W8u_XreP730"] 
        },
        "A1-READING": { 
            title: "Expert Reading Lessons", 
            videos: ["8X_2L9-0Y_0", "N_pE0uI7t28", "sM4_6_pS_eE", "hl9p_vXfXyI", "6Wp7_rX-uUo"] 
        },
        "A1-WRITING": { 
            title: "Expert Writing Lessons", 
            videos: ["hG6_S8u9XyI", "d-W09W4E-S8", "j8H4HPHd1_c", "0_eiQFV8UA0", "AGEOQR2nrjk"] 
        },
        "A1-SPEAKING": { 
            title: "Expert Speaking Lessons", 
            videos: ["o3F8TLQBwdE", "iG9_p-rMuwY", "hpkxUKHrvRk", "P2X_vU_aB_U", "1S_pS_S8_Yk"] 
        }
    };

    function access() {
        const code = document.getElementById('pass').value.toUpperCase().trim();
        const data = database[code];

        if (data) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('contentSection').classList.remove('hidden');
            document.getElementById('skillTitle').innerText = data.title;

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            data.videos.forEach((videoId, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div style="padding:15px; font-size:13px; border-bottom:1px solid #1a2436; color: #d4af37; text-align:center; font-weight:bold;">
                        LESSON ${index + 1}
                    </div>
                    <div class="player-container" data-plyr-provider="youtube" data-plyr-embed-id="${videoId}"></div>
                `;
                grid.appendChild(card);
            });

            // تفعيل المشغل الاحترافي
            const players = Array.from(document.querySelectorAll('.player-container')).map(p => new Plyr(p, {
                youtube: { 
                    noCookie: false, 
                    rel: 0, 
                    showinfo: 0, 
                    iv_load_policy: 3, 
                    modestbranding: 1 
                }
            }));
        } else {
            alert("الكود غير صحيح! يرجى إدخال الكود المناسب.");
        }
    }
</script>
</body>
</html>
