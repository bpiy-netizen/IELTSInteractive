<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية - النسخة الذهبية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --primary-dark: #000a14;
            --gold-matte: #c5a059;
            --gold-bright: #f1d279;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--primary-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            font-family: 'Cairo', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header { padding: 40px 20px; text-align: center; }

        .header-logo-container {
            max-width: 500px; margin: 0 auto; padding: 15px;
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 20px; backdrop-filter: blur(10px);
        }

        .header-logo-container img { width: 100%; height: auto; display: block; border-radius: 10px; }

        .container { max-width: 1100px; margin: 0 auto 100px; padding: 0 20px; }

        .skills-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 40px 0; }

        .skill-box {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 25px 15px; cursor: pointer;
            transition: 0.4s; text-align: center;
        }

        .skill-box.active {
            border-color: var(--gold-bright); background: rgba(197, 160, 89, 0.1);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .content-panel {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 30px; padding: 30px; display: none; backdrop-filter: blur(20px);
        }
        .content-panel.active { display: block; }

        .lesson-tile {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);
            padding: 20px; border-radius: 15px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px; cursor: pointer; transition: 0.3s;
        }

        .lesson-tile:hover { background: rgba(197, 160, 89, 0.1); border-color: var(--gold-bright); }

        .play-circle {
            width: 45px; height: 45px; background: var(--gold-matte);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary-dark); font-size: 1rem;
        }

        /* --- تصميم مشغل الفيديو المنبثق (كما في الصورة الأخيرة) --- */
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(8px);
        }

        .video-container {
            width: 90%; max-width: 850px; position: relative;
            border: 1px solid var(--gold-matte); border-radius: 15px; overflow: hidden;
            background: #1a1a1a; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        video { width: 100%; display: block; outline: none; }

        .close-btn {
            position: absolute; top: 10px; right: 15px; color: white;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; z-index: 1001; border: 1px solid var(--border-glass);
        }
        .close-btn:hover { background: var(--gold-matte); color: var(--primary-dark); }
    </style>
</head>
<body>

<header>
    <div class="header-logo-container">
        <img src="logo.png" alt="IELTS Interactive Logo">
    </div>
</header>

<div class="container">
    <div class="skills-nav">
        <div class="skill-box active" onclick="openSkill('listening', this)"><i class="fas fa-headphones-alt"></i><br><span>الاستماع</span></div>
        <div class="skill-box" onclick="openSkill('reading', this)"><i class="fas fa-book-open"></i><br><span>القراءة</span></div>
        <div class="skill-box" onclick="openSkill('writing', this)"><i class="fas fa-pen-nib"></i><br><span>الكتابة</span></div>
        <div class="skill-box" onclick="openSkill('speaking', this)"><i class="fas fa-users"></i><br><span>المحادثة</span></div>
    </div>

    <div id="listening" class="content-panel active">
        <h3 style="color: var(--gold-bright); margin-bottom: 20px;">مكتبة الاستماع الذهبية</h3>
        
        <div class="lesson-tile" onclick="playLocalVideo('intro.mp4')">
            <div>
                <h4 style="margin:0;">مرحباً بك في المنصة التفاعلية</h4>
                <p style="margin:5px 0 0; color: #888; font-size: 0.85rem;">مقدمة وشرح عام للمنصة</p>
            </div>
            <div class="play-circle"><i class="fas fa-play"></i></div>
        </div>

        <div class="lesson-tile" onclick="playLocalVideo('test_video.mp4')">
            <div>
                <h4 style="margin:0;">تجربة تشغيل فيديو 2</h4>
                <p style="margin:5px 0 0; color: #888; font-size: 0.85rem;">اختبار الملفات المحلية</p>
            </div>
            <div class="play-circle"><i class="fas fa-play"></i></div>
        </div>
    </div>

    <div id="reading" class="content-panel"><h3>قريباً...</h3></div>
    <div id="writing" class="content-panel"><h3>قريباً...</h3></div>
    <div id="speaking" class="content-panel"><h3>قريباً...</h3></div>
</div>

<div id="videoOverlay" class="video-overlay" onclick="closeVideo()">
    <div class="video-container" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeVideo()"><i class="fas fa-times"></i> إغلاق</div>
        <video id="mainVideo" controls controlsList="nodownload">
            <source src="" type="video/mp4">
            المتصفح لا يدعم تشغيل هذا الفيديو.
        </video>
    </div>
</div>

<script>
    function openSkill(id, element) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.skill-box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    }

    function playLocalVideo(file) {
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('mainVideo');
        video.src = file; // يقرأ من نفس المجلد
        overlay.style.display = 'flex';
        video.play();
    }

    function closeVideo() {
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('mainVideo');
        video.pause();
        video.src = "";
        overlay.style.display = 'none';
    }
</script>

</body>
</html>
