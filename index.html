<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية - النسخة النخبوية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --primary-dark: #000a14;
            --secondary-dark: #001225;
            --gold-matte: #c5a059;
            --gold-bright: #f1d279;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--primary-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            font-family: 'Cairo', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #001225, transparent);
        }

        /* حاوية صورة التعاون */
        .header-logo-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .header-logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .sub-header-text {
            color: var(--gold-matte);
            font-size: 1.2rem;
            margin-top: 20px;
            font-weight: 700;
        }

        .container { max-width: 1100px; margin: 20px auto 100px; padding: 0 20px; }

        .info-cards {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px;
        }
        .info-item {
            background: var(--glass); border: 1px solid var(--border-glass);
            padding: 15px; border-radius: 15px; text-align: center;
            font-size: 0.9rem; color: var(--gold-bright); backdrop-filter: blur(10px);
        }

        .skills-nav {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 60px;
        }

        .skill-box {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--border-glass); border-radius: 25px;
            padding: 35px 20px; cursor: pointer; transition: all 0.4s ease;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .skill-box i { font-size: 2.5rem; color: var(--gold-matte); }
        .skill-box span { font-weight: 700; color: white; }

        .skill-box.active {
            border-color: var(--gold-bright);
            background: rgba(197, 160, 89, 0.1);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .content-panel {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 35px; padding: 40px; display: none;
            backdrop-filter: blur(20px);
        }
        .content-panel.active { display: block; animation: fadeIn 0.8s ease; }

        .lesson-tile {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px; cursor: pointer;
        }

        .play-circle {
            width: 50px; height: 50px; background: var(--gold-matte);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary-dark);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .skills-nav { grid-template-columns: repeat(2, 1fr); }
            .info-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo-container">
        <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1715725200/partnership_header.png" alt="51Talk x IELTS Interactive">
    </div>
    <p class="sub-header-text">هدية التميز ووصول كامل لطلابنا النخبة</p>
</header>

<div class="container">
    <div class="info-cards">
        <div class="info-item"><i class="fas fa-gem"></i> Gold Edition</div>
        <div class="info-item"><i class="fas fa-shield-alt"></i> وصول كامل 24/7</div>
        <div class="info-item"><i class="fas fa-graduation-cap"></i> محتوى CEFR معتمد</div>
    </div>

    <div class="skills-nav">
        <div class="skill-box active" onclick="openSkill('listening', this)">
            <i class="fas fa-headphones-alt"></i><span>الاستماع</span>
        </div>
        <div class="skill-box" onclick="openSkill('reading', this)">
            <i class="fas fa-book-open"></i><span>القراءة</span>
        </div>
        <div class="skill-box" onclick="openSkill('writing', this)">
            <i class="fas fa-pen-nib"></i><span>الكتابة</span>
        </div>
        <div class="skill-box" onclick="openSkill('speaking', this)">
            <i class="fas fa-users"></i><span>المحادثة</span>
        </div>
    </div>

    <div id="listening" class="content-panel active">
        <h2 style="color: var(--gold-bright); margin-bottom: 30px;">مكتبة الاستماع الذهبية</h2>
        <div class="lesson-tile">
            <div>
                <h3 style="margin:0; color: white;">الدرس الأول: مقدمة وشرح عام</h3>
                <p style="margin:5px 0 0; color: #888;">استعراض مميزات الموقع والدروس</p>
            </div>
            <div class="play-circle"><i class="fas fa-play"></i></div>
        </div>
    </div>

    <div id="reading" class="content-panel"><h2 style="text-align:center;">قريباً...</h2></div>
    <div id="writing" class="content-panel"><h2 style="text-align:center;">قريباً...</h2></div>
    <div id="speaking" class="content-panel"><h2 style="text-align:center;">قريباً...</h2></div>
</div>

<script>
    function openSkill(id, element) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.skill-box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    }
</script>

</body>
</html>
