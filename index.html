<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        
        :root {
            --primary: #000a14;
            --gold: #c5a059;
            --gold-light: #f1d279;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; background-color: var(--primary);
            font-family: 'Cairo', sans-serif; color: #e0e0e0;
            background-image: radial-gradient(circle at 50% 0%, rgba(197, 160, 89, 0.1) 0%, transparent 50%);
        }

        /* Header & Logo */
        header { padding: 40px 20px; text-align: center; }
        .logo-wrapper {
            max-width: 400px; margin: 0 auto; padding: 20px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-wrapper img { width: 100%; border-radius: 10px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Navigation Tiles */
        .skills-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin: 40px 0;
        }
        .skill-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 30px; border-radius: 20px; cursor: pointer;
            transition: 0.3s; text-align: center;
        }
        .skill-card:hover, .skill-card.active {
            border-color: var(--gold); background: rgba(197, 160, 89, 0.1);
            transform: translateY(-5px);
        }
        .skill-card i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }

        /* Video Section */
        .video-section {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 30px; padding: 40px; margin-top: 20px;
            display: grid; grid-template-columns: 1fr 300px; gap: 30px;
        }

        .video-player-container {
            background: #000; border: 2px solid var(--gold);
            border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        video { width: 100%; display: block; outline: none; }

        /* Playlist */
        .playlist { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .playlist-item {
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 12px; margin-bottom: 10px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
        }
        .playlist-item:hover { background: rgba(197, 160, 89, 0.1); }
        .playlist-item.playing { border-color: var(--gold); background: rgba(197, 160, 89, 0.2); }
        .playlist-item h4 { margin: 0; font-size: 0.9rem; }

        @media (max-width: 900px) {
            .video-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <img src="logo.png" alt="IELTS Academy" onerror="this.src='https://via.placeholder.com/400x120/000a14/c5a059?text=IELTS+ACADEMY'">
    </div>
</header>

<div class="container">
    <div class="skills-grid">
        <div class="skill-card active" onclick="loadCategory('listening')"><i class="fas fa-headphones"></i><h3>الاستماع</h3></div>
        <div class="skill-card" onclick="loadCategory('reading')"><i class="fas fa-book-open"></i><h3>القراءة</h3></div>
        <div class="skill-card" onclick="loadCategory('writing')"><i class="fas fa-pen-nib"></i><h3>الكتابة</h3></div>
        <div class="skill-card" onclick="loadCategory('speaking')"><i class="fas fa-users"></i><h3>المحادثة</h3></div>
    </div>

    <div class="video-section">
        <div class="video-player-container">
            <video id="mainVideo" controls controlsList="nodownload">
                <source id="videoSource" src="intro.mp4" type="video/mp4">
            </video>
            <div style="padding: 20px;">
                <h2 id="nowPlayingTitle" style="color: var(--gold-light); margin: 0;">مرحباً بك في المنصة</h2>
                <p id="nowPlayingDesc" style="color: #888; margin: 10px 0 0;">دورة الآيلتس المكثفة - د. مصطفى مكاحلة</p>
            </div>
        </div>

        <div class="playlist" id="playlistItems">
            </div>
    </div>
</div>

<script>
    // هيكل البيانات لإضافة الدروس بسهولة
    const lessons = {
        listening: [
            { title: "مقدمة قسم الاستماع", file: "intro.mp4", desc: "كيف تحصل على 8.0 في الاستماع" },
            { title: "حل أسئلة الخرائط", file: "map-skills.mp4", desc: "تكتيكات تحديد الاتجاهات" }
        ],
        reading: [
            { title: "استراتيجية Skimming", file: "reading-1.mp4", desc: "القراءة السريعة للنصوص الأكاديمية" }
        ]
    };

    function loadCategory(cat) {
        const container = document.getElementById('playlistItems');
        container.innerHTML = ''; // تنظيف القائمة
        
        // تحديث شكل البطاقات
        document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if (lessons[cat]) {
            lessons[cat].forEach((lesson, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.onclick = () => playLesson(lesson.file, lesson.title, lesson.desc, item);
                item.innerHTML = `<h4>${index + 1}. ${lesson.title}</h4>`;
                container.appendChild(item);
            });
        }
    }

    function playLesson(file, title, desc, element) {
        const video = document.getElementById('mainVideo');
        const source = document.getElementById('videoSource');
        
        document.querySelectorAll('.playlist-item').forEach(i => i.classList.remove('playing'));
        element.classList.add('playing');

        source.src = file;
        document.getElementById('nowPlayingTitle').innerText = title;
        document.getElementById('nowPlayingDesc').innerText = desc;
        
        video.load();
        video.play();
    }

    // تحميل قسم الاستماع افتراضياً
    window.onload = () => loadCategory('listening');
</script>

</body>
</html>
