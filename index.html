<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة IELTS التفاعلية - د. مصطفى</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .search-box { margin-bottom: 30px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #videoContainer { margin-top: 20px; display: none; }
        video { border: 5px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <h1>بوابة دروس IELTS الذكية</h1>
    <p>أدخل رمز المستوى (مثلاً: A1-LISTENING) لمشاهدة الدرس</p>

    <div class="search-box">
        <input type="text" id="studentInput" placeholder="اكتب رمز الدرس هنا...">
        <button onclick="searchLesson()">عرض الدرس</button>
    </div>

    <div id="videoContainer">
        <h3 id="lessonTitle"></h3>
        <video id="videoPlayer" width="640" controls>
            <source src="" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <script>
        async function searchLesson() {
            const category = document.getElementById('studentInput').value.toUpperCase().trim();
            const cloudName = "dr3i6fqai";
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            const lessonTitle = document.getElementById('lessonTitle');

            if (!category) {
                alert("يرجى إدخال رمز المستوى أولاً");
                return;
            }

            // ملاحظة: روابط الـ JSON في Cloudinary تحتاج تفعيل خاصية "Client-side resource list" 
            // كحل أضمن ومباشر، سنقوم ببناء الرابط بناءً على الوسم (Tag)
            try {
                // الرابط المباشر للفيديو باستخدام الـ Tag الذي وضعته في بايثون
                // ملاحظة: Cloudinary يعرض أحدث فيديو بهذا الـ Tag
                const videoUrl = `https://res.cloudinary.com/${cloudName}/video/upload/t_${category}/v1/dummy.mp4`;
                
                // للتبسيط الآن، سنستخدم الرابط الذي ظهر لك في الشاشة السوداء يدوياً أو نربطه برمز ثابت
                // سأعطيك الطريقة الأسهل للربط المباشر:
                const finalUrl = `https://res.cloudinary.com/${cloudName}/video/upload/${category}.mp4`;

                videoPlayer.src = finalUrl;
                lessonTitle.innerText = "عرض درس: " + category;
                videoContainer.style.display = "block";
                videoPlayer.load();
                videoPlayer.play();

            } catch (error) {
                alert("تعذر العثور على الدرس، تأكد من الرمز");
            }
        }
    </script>
</body>
</html>
