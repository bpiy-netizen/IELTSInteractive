<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --bg: #000a14; --sidebar: #001226; --gold: #c5a059; --text: #e2e8f0; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .login-box input { padding: 12px; border-radius: 8px; border: none; width: 220px; text-align: center; margin-bottom: 15px; outline: none; }
        .login-box button { background: var(--gold); border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .sidebar { width: 350px; background: var(--sidebar); border-left: 1px solid rgba(197,160,89,0.2); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .sidebar-header img { max-width: 150px; }
        .lessons-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .lesson-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; border: 1px solid transparent; }
        .lesson-item.active { background: var(--gold); color: black; font-weight: bold; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .details { padding: 30px; background: var(--bg); border-top: 1px solid rgba(197,160,89,0.1); flex-grow: 1; }
        .details h1 { color: var(--gold); margin: 0; font-size: 1.8rem; }
        .details p { margin-top: 10px; color: #94a3b8; line-height: 1.7; }
        @media (max-width: 1000px) { body { flex-direction: column; overflow: auto; } .sidebar { width: 100%; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color:var(--gold)">دخول الطلاب</h2>
            <input type="password" id="passCode" placeholder="أدخل الرمز">
            <br>
            <button onclick="checkAccess()">دخول</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header"><img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1778798404/117_z6fozk.png"></div>
        <div class="lessons-list">
            <div class="lesson-item active" onclick="loadContent('video', 'https://res.cloudinary.com/dr3i6fqai/video/upload/v1778804565/Lark20260515-032212_pp1bf8.mp4', '1. بوابة النجاح', 'مقدمة تعريفية عن المنصة وكيفية البدء.', this)">
                <i class="fas fa-play-circle"></i> <span>1. بوابة النجاح</span>
            </div>
            <div class="lesson-item" onclick="loadContent('youtube', 'https://www.youtube.com/embed/9X5_U7TidXk', '2. الخطة الكاملة', 'خارطة طريق شاملة لاختبار الايلتس من الصفر.', this)">
                <i class="fas fa-map-marked-alt"></i> <span>2. الخطة الكاملة</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="video-container" id="playerArea">
            <video controls><source src="https://res.cloudinary.com/dr3i6fqai/video/upload/v1778804565/Lark20260515-032212_pp1bf8.mp4" type="video/mp4"></video>
        </div>
        <div class="details">
            <h1 id="tText">1. بوابة النجاح</h1>
            <p id="dText">مقدمة تعريفية عن المنصة وكيفية البدء.</p>
        </div>
    </main>

    <script>
        function checkAccess() {
            if(document.getElementById('passCode').value === '1234') document.getElementById('lock-screen').style.display = 'none';
            else alert('خطأ!');
        }

        function loadContent(type, url, title, desc, el) {
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const area = document.getElementById('playerArea');
            if(type === 'youtube') {
                area.innerHTML = `<iframe src="${url}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                area.innerHTML = `<video controls autoplay><source src="${url}" type="video/mp4"></video>`;
            }
            
            document.getElementById('tText').innerText = title;
            document.getElementById('dText').innerText = desc;
        }
    </script>
</body>
</html>
