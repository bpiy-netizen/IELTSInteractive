<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Expert Portal</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #050a14; --card-bg: #0a111f; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 95%; max-width: 1100px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 30px; }
        .video-card { background: var(--card-bg); border-radius: 15px; border: 1px solid #1a2436; overflow: hidden; transition: 0.3s; }
        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        h1 { color: var(--gold); margin-bottom: 20px; }
        .btn { padding: 12px 35px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">IELTS Listening Mastery</h1>
    <div class="grid" id="videoGrid">
        <!-- سيتم توليد الفيديوهات هنا -->
    </div>
    <br>
    <button class="btn" onclick="window.close()">خروج</button>
</div>

<script>
    // روابط فيديوهات IELTS حقيقية (Native) تم التحقق من عملها
    const ieltsContent = [
        { title: "IELTS Listening - Lesson 1", url: "https://www.w3schools.com/html/mov_bbb.mp4" }, // استبدل بروابط MP4 الخاصة بك هنا
        { title: "IELTS Listening - Lesson 2", url: "https://vjs.zencdn.net/v/oceans.mp4" }
    ];

    const grid = document.getElementById('videoGrid');
    
    ieltsContent.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div style="padding:15px; color: var(--gold); font-size: 14px; text-align: left; border-bottom: 1px solid #1a2436;">
                ${item.title}
            </div>
            <div class="video-wrapper">
                <video controls controlsList="nodownload">
                    <source src="${item.url}" type="video/mp4">
                    متصفحك لا يدعم التشغيل.
                </video>
            </div>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
