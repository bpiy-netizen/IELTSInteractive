<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Premium | مصادر تعليمية مفتوحة</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #050a14; --card-bg: #0a111f; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 90%; max-width: 1150px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 30px; }
        .video-card { background: var(--card-bg); border-radius: 15px; border: 1px solid #1a2436; overflow: hidden; transition: 0.3s; }
        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        h1 { color: var(--gold); font-size: 2.2em; margin-bottom: 5px; }
        .login-box { max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #1a2436; background: #0f172a; color: #fff; text-align: center; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 12px 35px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; transition: 0.3s; width: 100%; font-size: 16px; }
        .btn:hover { background: #f2d06b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="login-box">
        <h1>IELTS Expert Portal</h1>
        <p style="color: #8892b0; margin-bottom: 25px;">محتوى تعليمي Native مضمون التشغيل</p>
        <input type="password" id="pass" placeholder="أدخل كود المهارة (مثلاً: A1-LISTENING)">
        <button class="btn" onclick="access()">دخول المنصة</button>
    </div>

    <div id="contentSection" class="hidden">
        <h2 id="skillTitle" style="color: var(--gold)"></h2>
        <div class="grid" id="videoGrid"></div>
        <br><br>
        <button class="btn" onclick="location.reload()" style="background:#1a2436; color:#fff; width: auto;">خروج</button>
    </div>
</div>

<script>
    // تم اختيار روابط من منصات تسمح بالتشغيل الخارجي لضمان الجودة
    const database = {
        "A1-LISTENING": { 
            title: "Listening Masterclass", 
            videos: [
                "https://player.vimeo.com/video/259411563", // Native English Sample
                "https://player.vimeo.com/video/110534220", // Educational Content
                "https://player.vimeo.com/video/343204961", // Native Speaker Presentation
                "https://player.vimeo.com/video/442751515", // Language Training
                "https://player.vimeo.com/video/146022717"  // Demo Lesson
            ] 
        },
        "A1-READING": { 
            title: "Reading Mastery", 
            videos: [
                "https://player.vimeo.com/video/123382747",
                "https://player.vimeo.com/video/132470725",
                "https://player.vimeo.com/video/131062068",
                "https://player.vimeo.com/video/108928061",
                "https://player.vimeo.com/video/132470653"
            ] 
        }
    };

    function access() {
        const code = document.getElementById('pass').value.toUpperCase().trim();
        const data = database[code];

        if (data) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('contentSection').classList.remove('hidden');
            document.getElementById('skillTitle').innerText = data.title;

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            data.videos.forEach((link, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div style="padding:15px; font-size:13px; color: var(--gold); border-bottom: 1px solid #1a2436; text-align: left;">
                        OFFICIAL CONTENT - LESSON ${index + 1}
                    </div>
                    <div class="video-wrapper">
                        <iframe src="${link}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                    </div>
                `;
                grid.appendChild(card);
            });
        } else {
            alert("الكود غير صحيح! يرجى المحاولة مرة أخرى.");
        }
    }
</script>
</body>
</html>
