<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Interactive Portal</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #000b1e; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #d4af37; text-align: center; width: 90%; max-width: 800px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; }
        input { width: 80%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #333; background: #001529; color: #fff; text-align: center; font-size: 18px; }
        button { padding: 12px 30px; background: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .video-wrapper { display: none; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #d4af37; background: #000; }
        .plyr__video-embed iframe { transform: scale(1.01); } /* تحسين مظهر التغطية */
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h1>IELTS Interactive</h1>
        <input type="password" id="pass" placeholder="أدخل كود الوصول">
        <br>
        <button onclick="access()">دخول</button>
    </div>

    <div id="videoSection" class="video-wrapper">
        <h2 id="title" style="color:#d4af37; margin: 15px;"></h2>
        <div class="plyr__video-embed" id="player">
            </div>
        <br>
        <button onclick="location.reload()" style="background:#222; color:#fff; margin-bottom: 15px;">تسجيل خروج</button>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    function access() {
        const code = document.getElementById('pass').value;
        const videoSection = document.getElementById('videoSection');
        const loginSection = document.getElementById('loginSection');
        const titleElement = document.getElementById('title');
        const playerDiv = document.getElementById('player');

        // قاعدة بيانات الفيديوهات (ID حقيقي شغال)
        const db = {
            "IELTS-A1": { 
                title: "تأسيس الاستماع - المستوى A1", 
                youtubeId: "H8mRwu1gdbE" 
            }
        };

        if (db[code]) {
            loginSection.style.display = 'none';
            videoSection.style.display = 'block';
            titleElement.innerText = db[code].title;
            
            // حقن الفيديو مباشرة داخل الـ HTML
            playerDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${db[code].youtubeId}?origin=https://plyr.io&amp;iv_load_policy=3&amp;modestbranding=1&amp;playsinline=1&amp;showinfo=0&amp;rel=0&amp;enablejsapi=1" allowfullscreen allowtransparency allow="autoplay"></iframe>`;
            
            // تفعيل المشغل الاحترافي
            new Plyr(playerDiv);
        } else {
            alert("الكود الصحيح للتجربة هو: IELTS-A1");
        }
    }
</script>
</body>
</html>
