<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية د. مصطفى IELTS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --accent: #ff9a9e;
            --text-dark: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at top right, #e0eafc, #cfdef3);
            min-height: 100vh;
        }

        /* الهيدر الاحترافي */
        header {
            background: var(--main-gradient);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        header h1 { font-size: 2.5rem; margin: 0; letter-spacing: 1px; }
        header p { opacity: 0.9; font-size: 1.1rem; margin-top: 10px; }

        .container { max-width: 1000px; margin: -40px auto 50px; padding: 0 20px; }

        /* لوحة التحكم السريعة */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .stat-card {
            background: white; padding: 15px; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-bottom: 4px solid #764ba2;
        }

        /* قائمة المهارات */
        .skills-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .skill-btn {
            background: white; border: none; padding: 25px; border-radius: 25px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .skill-btn i { font-size: 2.5rem; color: #667eea; }
        .skill-btn span { font-weight: bold; font-size: 1.2rem; color: var(--text-dark); }

        .skill-btn:hover, .skill-btn.active {
            background: var(--main-gradient); transform: translateY(-10px);
        }
        .skill-btn:hover i, .skill-btn:hover span, .skill-btn.active i, .skill-btn.active span { color: white; }

        /* قسم الدروس */
        .lessons-container {
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 30px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .lessons-container.active { display: block; animation: fadeInUp 0.6s ease; }

        .lesson-card {
            background: white; margin-bottom: 15px; padding: 20px;
            border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; transition: 0.3s; border: 1px solid #eee;
            cursor: pointer;
        }
        .lesson-card:hover { border-color: #667eea; background: #f8faff; padding-right: 30px; }

        .play-btn { 
            background: #667eea; color: white; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* نافذة الفيديو (Modal) */
        .video-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display:none; z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { width: 100%; max-width: 800px; position: relative; }
        video { width: 100%; border-radius: 20px; box-shadow: 0 0 50px rgba(255,255,255,0.2); }
        .close-modal { 
            position: absolute; top: -50px; right: 0; color: white; 
            font-size: 2rem; cursor: pointer; 
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-star"></i> أكاديمية IELTS الذكية</h1>
    <p>برفقة د. مصطفى - منصتك المتكاملة للنجاح</p>
</header>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card"><strong>4</strong> المهارات</div>
        <div class="stat-card"><strong>+20</strong> دروس متوقعة</div>
        <div class="stat-card"><strong>24/7</strong> وصول كامل</div>
    </div>

    <div class="skills-grid">
        <button class="skill-btn active" onclick="showSkill('listening', this)">
            <i class="fas fa-headset"></i><span>الاستماع</span>
        </button>
        <button class="skill-btn" onclick="showSkill('reading', this)">
            <i class="fas fa-book-reader"></i><span>القراءة</span>
        </button>
        <button class="skill-btn" onclick="showSkill('writing', this)">
            <i class="fas fa-pen-fancy"></i><span>الكتابة</span>
        </button>
        <button class="skill-btn" onclick="showSkill('speaking', this)">
            <i class="fas fa-microphone-alt"></i><span>المحادثة</span>
        </button>
    </div>

    <div id="listening" class="lessons-container active">
        <h2 style="margin-top:0; color:#444;"><i class="fas fa-play-circle"></i> دروس مهارة الاستماع المتاحة</h2>
        <div class="lesson-card" onclick="openVideo('L1', 'final projet 1.mov', 'الدرس التمهيدي للمنصة')">
            <div>
                <strong style="display:block; font-size:1.1rem;">مرحباً بك في المنصة</strong>
                <small style="color:#777;">اضغط لبدء الفيديو التجريبي</small>
            </div>
            <div class="play-btn"><i class="fas fa-play"></i></div>
        </div>
        </div>

    <div id="reading" class="lessons-container"><h2 style="text-align:center; color:#888;">قريباً... مكتبة القراءة الشاملة</h2></div>
    <div id="writing" class="lessons-container"><h2 style="text-align:center; color:#888;">قريباً... أسرار كتابة الـ Essay</h2></div>
    <div id="speaking" class="lessons-container"><h2 style="text-align:center; color:#888;">قريباً... تدريبات المحادثة التفاعلية</h2></div>
</div>

<div class="video-modal" id="videoModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeVideo()">&times; إغلاق</span>
        <video id="mainPlayer" controls playsinline></video>
        <h3 id="modalTitle" style="color:white; text-align:center; margin-top:15px;"></h3>
    </div>
</div>

<script>
    function showSkill(id, btn) {
        document.querySelectorAll('.lessons-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function openVideo(folder, file, title) {
        const cloudName = "dr3i6fqai";
        const url = `https://res.cloudinary.com/${cloudName}/video/upload/f_auto,q_auto/${folder}/${file}`;
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('mainPlayer');
        
        document.getElementById('modalTitle').innerText = title;
        player.src = url;
        modal.style.display = 'flex';
        player.play();
    }

    function closeVideo() {
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('mainPlayer');
        modal.style.display = 'none';
        player.pause();
    }
</script>

</body>
</html>
