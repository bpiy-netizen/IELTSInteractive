<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية - النسخة الذهبية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --primary-dark: #000a14;
            --gold-matte: #c5a059;
            --gold-bright: #f1d279;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--primary-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            font-family: 'Cairo', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header { padding: 50px 20px; text-align: center; }

        .header-logo-container {
            max-width: 550px; margin: 0 auto; padding: 15px;
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 20px; backdrop-filter: blur(10px);
        }

        .header-logo-container img { width: 100%; height: auto; display: block; border-radius: 10px; }

        .container { max-width: 1100px; margin: 0 auto 100px; padding: 0 20px; }

        .skills-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 50px 0; }

        .skill-box {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 25px; padding: 35px 20px; cursor: pointer;
            transition: 0.4s; text-align: center;
        }

        .skill-box.active {
            border-color: var(--gold-bright); background: rgba(197, 160, 89, 0.1);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .content-panel {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 35px; padding: 40px; display: none; backdrop-filter: blur(20px);
        }
        .content-panel.active { display: block; animation: fadeIn 0.5s ease; }

        .lesson-tile {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);
            padding: 25px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }

        .lesson-tile:hover { background: rgba(197, 160, 89, 0.1); border-color: var(--gold-bright); }

        .play-circle {
            width: 50px; height: 50px; background: var(--gold-matte);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary-dark); font-size: 1.1rem;
        }

        /* --- تصميم مشغل الفيديو المنبثق للملفات المحلية --- */
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(10px);
        }

        .video-container {
            width: 90%; max-width: 900px; position: relative;
            border: 2px solid var(--gold-matte); border-radius: 15px; overflow: hidden;
            background: #000;
        }

        video { width: 100%; display: block; }

        .close-video {
            position: absolute; top: 15px; right: 20px; color: white;
            font-size: 25px; cursor: pointer; z-index: 1001; background: rgba(0,0,0,0.5);
            padding: 5px 15px; border-radius: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { .skills-nav { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="header-logo-container">
        <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1778798404/117_z6fozk.png" alt="Logo">
    </div>
</header>

<div class="container">
    <div class="skills-nav">
        <div class="skill-box active" onclick="openSkill('listening', this)"><i class="fas fa-headphones-alt"></i><br><span>الاستماع</span></div>
        <div class="skill-box" onclick="openSkill('reading', this)"><i class="fas fa-book-open"></i><br><span>القراءة</span></div>
        <div class="skill-box" onclick="openSkill('writing', this)"><i class="fas fa-pen-nib"></i><br><span>الكتابة</span></div>
        <div class="skill-box" onclick="openSkill('speaking', this)"><i class="fas fa-users"></i><br><span>المحادثة</span></div>
    </div>

    <div id="listening" class="content-panel active">
        <h2 style="color: var(--gold-bright);">دروس الاستماع</h2>
        
        <div class="lesson-tile" onclick="openLocalVideo('intro.mp4')">
            <div>
                <h3 style="margin:0;">الدرس الأول: مقدمة</h3>
                <p style="margin:5px 0 0; color: #888;">ملف فيديو من المجلد المحلي</p>
            </div>
            <div class="play-circle"><i class="fas fa-play"></i></div>
        </div>
    </div>

    <div id="reading" class="content-panel"><h2>قريباً...</h2></div>
    <div id="writing" class="content-panel"><h2>قريباً...</h2></div>
    <div id="speaking" class="content-panel"><h2>قريباً...</h2></div>
</div>

<div id="videoOverlay" class="video-overlay">
    <div class="video-container">
        <span class="close-video" onclick="closeLocalVideo()">&times; إغلاق</span>
        <video id="localVideoPlayer" controls controlsList="nodownload">
            <source src="" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>
</div>

<script>
    function openSkill(id, element) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.skill-box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    }

    function openLocalVideo(fileName) {
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('localVideoPlayer');
        video.src = fileName; // سيقرأ الملف من نفس مجلد الـ HTML
        overlay.style.display = 'flex';
        video.play();
    }

    function closeLocalVideo() {
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('localVideoPlayer');
        video.pause();
        video.src = "";
        overlay.style.display = 'none';
    }
</script>

</body>
</html>
