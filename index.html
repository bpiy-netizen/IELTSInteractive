<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --bg: #000a14; --sidebar: #001226; --gold: #c5a059; --text: #e2e8f0; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* شاشة الدخول */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .login-box input { padding: 12px; border-radius: 8px; border: none; width: 220px; text-align: center; margin-bottom: 15px; outline: none; font-size: 1.1rem; }
        .login-box button { background: var(--gold); border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* القائمة الجانبية */
        .sidebar { width: 350px; background: var(--sidebar); border-left: 1px solid rgba(197,160,89,0.2); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .sidebar-header img { max-width: 150px; }
        .lessons-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .lesson-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; border: 1px solid transparent; }
        .lesson-item:hover { background: rgba(197,160,89,0.1); }
        .lesson-item.active { background: var(--gold); color: black; font-weight: bold; }

        /* المحتوى الرئيسي */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: #000; overflow-y: auto; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        video { width: 100%; height: 100%; display: block; }
        .details { padding: 30px; background: var(--bg); border-top: 1px solid rgba(197,160,89,0.1); flex-grow: 1; }
        .details h1 { color: var(--gold); margin: 0; font-size: 1.8rem; }
        .details p { margin-top: 10px; color: #94a3b8; line-height: 1.7; }

        @media (max-width: 1000px) { body { flex-direction: column; overflow: auto; } .sidebar { width: 100%; height: auto; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color:var(--gold)">دخول الطلاب</h2>
            <input type="password" id="passCode" placeholder="أدخل الرمز">
            <br>
            <button onclick="checkAccess()">دخول</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1778798404/117_z6fozk.png" alt="Logo">
        </div>
        <div class="lessons-list" id="list">
            <div class="lesson-item active" onclick="playLesson('https://res.cloudinary.com/dr3i6fqai/video/upload/v1778804565/Lark20260515-032212_pp1bf8.mp4', '1. بوابة النجاح: 51Talk', 'مقدمة تعريفية عن المنصة وكيفية البدء والمميزات المتاحة.', this)">
                <i class="fas fa-play-circle"></i> <span>1. بوابة النجاح</span>
            </div>
            <div class="lesson-item" onclick="playLesson('https://res.cloudinary.com/dr3i6fqai/video/upload/v1778809680/%D8%A7%D9%82%D9%88%D9%89_%D9%A5_%D8%AA%D9%83%D9%86%D9%8A%D9%83%D8%A7%D8%AA_%D9%81%D9%8A_%D9%82%D8%B3%D9%85_%D8%A7%D9%84%D9%82%D8%B1%D8%A7%D8%A1%D8%A9_-_%D8%A7%D9%84%D8%A7%D8%B3%D8%AA%D8%B2%D8%AF%D8%A7%D8%AF_%D9%84%D8%A7%D8%AE%D8%AA%D8%A8%D8%A7%D8%B1_%D8%A7%D9%84%D8%A7%D9%8A%D9%84%D8%AA%D8%B3_vsqujb.mp4', '2. أقوى 5 تكنيكات في القراءة', 'تعلم الاستراتيجيات الذهبية للتعامل مع نصوص القراءة المعقدة بسرعة ودقة.', this)">
                <i class="fas fa-lightbulb"></i> <span>2. تكنيكات القراءة</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="video-container" id="playerWrapper">
            <video id="vPlayer" controls preload="auto">
                <source src="https://res.cloudinary.com/dr3i6fqai/video/upload/v1778804565/Lark20260515-032212_pp1bf8.mp4" type="video/mp4">
            </video>
        </div>
        <div class="details">
            <h1 id="titleDisplay">1. بوابة النجاح: 51Talk</h1>
            <p id="descDisplay">مقدمة تعريفية عن المنصة وكيفية البدء والمميزات المتاحة.</p>
        </div>
    </main>

    <script>
        function checkAccess() {
            if(document.getElementById('passCode').value === '1234') { 
                document.getElementById('lock-screen').style.display = 'none';
            } else { 
                alert('الرمز غير صحيح!'); 
            }
        }

        function playLesson(url, title, desc, el) {
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            const wrapper = document.getElementById('playerWrapper');
            // ميزة التنظيف التلقائي للرابط لضمان التشغيل
            const cleanUrl = url.trim();
            
            wrapper.innerHTML = `<video id="vPlayer" controls autoplay preload="auto" controlsList="nodownload">
                                    <source src="${cleanUrl}" type="video/mp4">
                                 </video>`;
            
            document.getElementById('titleDisplay').innerText = title;
            document.getElementById('descDisplay').innerText = desc;
        }
    </script>
</body>
</html>
