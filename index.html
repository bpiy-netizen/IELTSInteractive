<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --bg: #000a14; --sidebar: #001226; --gold: #c5a059; --text: #e2e8f0; }
        
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* شاشة قفل الدخول */
        #lock-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .login-box input { padding: 12px; border-radius: 8px; border: none; width: 220px; text-align: center; font-size: 1.1rem; outline: none; margin-bottom: 10px; }
        .login-box button { background: var(--gold); border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .login-box button:hover { background: #b08d4a; transform: translateY(-2px); }

        /* التصميم الرئيسي */
        .sidebar { width: 350px; background: var(--sidebar); border-left: 1px solid rgba(197,160,89,0.2); display: flex; flex-direction: column; }
        .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .sidebar-header img { max-width: 180px; filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.3)); }
        
        .lessons-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .lesson-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; border: 1px solid transparent; }
        .lesson-item:hover { background: rgba(197,160,89,0.1); border-color: rgba(197,160,89,0.3); }
        .lesson-item.active { background: var(--gold); color: black; font-weight: bold; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; outline: none; }
        
        .details { padding: 40px; overflow-y: auto; }
        .details h1 { color: var(--gold); margin: 0; font-size: 2.2rem; }
        .details p { margin-top: 15px; font-size: 1.15rem; line-height: 1.8; color: #94a3b8; max-width: 800px; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; }
            .video-container { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color:var(--gold)">دخول الطلاب</h2>
            <p>يرجى إدخال رمز الوصول الخاص بالأكاديمية</p>
            <input type="password" id="passCode" placeholder="أدخل الرمز هنا">
            <br>
            <button onclick="checkAccess()">دخول المنصة</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1778798404/117_z6fozk.png" alt="51Talk Logo">
        </div>
        <div class="lessons-list" id="list">
            <div class="lesson-item active" onclick="play('https://res.cloudinary.com/dr3i6fqai/video/upload/f_auto,q_auto/v1778804565/Lark20260515-032212_pp1bf8.mp4', 'بوابة النجاح: 51Talk', 'مقدمة تعريفية شاملة عن منصة 51Talk في المملكة العربية السعودية، وأهم ميزاتها وكيفية البدء في تطوير مهاراتك اللغوية من خلالها.', this)">
                <i class="fas fa-play-circle" style="font-size: 1.5rem;"></i>
                <span>1. بوابة النجاح: 51Talk</span>
            </div>
            
            <div style="color: #444; font-size: 0.8rem; margin-top: 20px; text-align: center; border-top: 1px solid #111; padding-top: 10px;">
                قريباً: تكتيكات الـ IELTS المتقدمة
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="video-container">
            <video id="player" controls controlsList="nodownload">
                <source id="source" src="https://res.cloudinary.com/dr3i6fqai/video/upload/f_auto,q_auto/v1778804565/Lark20260515-032212_pp1bf8.mp4" type="video/mp4">
            </video>
        </div>
        <div class="details">
            <h1 id="title">بوابة النجاح: 51Talk</h1>
            <p id="desc">مقدمة تعريفية شاملة عن منصة 51Talk في المملكة العربية السعودية، وأهم ميزاتها وكيفية البدء في تطوير مهاراتك اللغوية من خلالها.</p>
        </div>
    </main>

    <script>
        // التحقق من الرمز
        function checkAccess() {
            const code = document.getElementById('passCode').value;
            if(code === '1234') { 
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                }, 300);
            } else {
                alert('عذراً، الرمز الذي أدخلته غير صحيح.');
            }
        }

        // دعم مفتاح Enter
        document.getElementById('passCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkAccess(); }
        });

        // تشغيل الفيديو وتحديث البيانات
        function play(url, title, desc, el) {
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const v = document.getElementById('player');
            const s = document.getElementById('source');
            
            s.src = url;
            document.getElementById('title').innerText = title;
            document.getElementById('desc').innerText = desc;
            
            v.load();
            v.play();
        }
    </script>
</body>
</html>
