<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية - النسخة الذهبية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --primary-dark: #000a14;
            --gold-matte: #c5a059;
            --gold-bright: #f1d279;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--primary-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            font-family: 'Cairo', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #001225, transparent);
        }

        .header-logo-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 10px;
            background: var(--glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .header-logo-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            /* إضافة تحسين بصري عبر CSS */
            image-rendering: -webkit-optimize-contrast;
        }

        .welcome-text {
            color: var(--gold-matte);
            font-size: 1.1rem;
            margin-top: 25px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .container { max-width: 1100px; margin: 0 auto 100px; padding: 0 20px; }

        .info-cards {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px;
        }
        .info-item {
            background: var(--glass); border: 1px solid var(--border-glass);
            padding: 15px; border-radius: 15px; text-align: center;
            font-size: 0.9rem; color: var(--gold-bright); backdrop-filter: blur(10px);
        }

        .skills-nav {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 60px;
        }

        .skill-box {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--border-glass); border-radius: 25px;
            padding: 35px 20px; cursor: pointer; transition: all 0.5s ease;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .skill-box:hover, .skill-box.active {
            transform: translateY(-10px);
            border-color: var(--gold-bright);
            box-shadow: 0 0 20px var(--gold-glow);
            background: rgba(197, 160, 89, 0.1);
        }

        .content-panel {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 35px; padding: 40px; display: none;
            backdrop-filter: blur(20px);
        }
        .content-panel.active { display: block; animation: slideUp 0.8s ease forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .skills-nav { grid-template-columns: repeat(2, 1fr); }
            .info-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo-container">
        <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/q_auto:best,f_auto/v1778798404/117_z6fozk.png" alt="51Talk x IELTS Interactive">
    </div>
    <p class="welcome-text">هدية التميز ووصول كامل لطلابنا النخبة - برعاية د. مصطفى</p>
</header>

<div class="container">
    <div class="info-cards">
        <div class="info-item"><i class="fas fa-gem"></i> Gold Edition</div>
        <div class="info-item"><i class="fas fa-shield-alt"></i> وصول كامل 24/7</div>
        <div class="info-item"><i class="fas fa-graduation-cap"></i> محتوى CEFR معتمد</div>
    </div>

    <div class="skills-nav">
        <div class="skill-box active" onclick="openSkill('listening', this)">
            <i class="fas fa-headphones-alt" style="font-size: 2.5rem; color: var(--gold-matte);"></i>
            <span style="font-weight: 700;">الاستماع</span>
        </div>
        </div>

    <div id="listening" class="content-panel active">
        <h2 style="color: var(--gold-bright);">مكتبة الاستماع الذهبية</h2>
        <p>مرحباً بك في المنصة التفاعلية برعاية د. مصطفى</p>
    </div>
</div>

<script>
    function openSkill(id, element) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.skill-box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    }
</script>

</body>
</html>
