<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية | د. مصطفى مكاحلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --bg: #000a14; --sidebar: #001226; --gold: #c5a059; --text: #e2e8f0; }
        
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* شاشة قفل الدخول */
        #lock-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .login-box input { padding: 10px; border-radius: 8px; border: none; width: 200px; text-align: center; font-size: 1.1rem; }
        .login-box button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* التصميم الرئيسي */
        .sidebar { width: 350px; background: var(--sidebar); border-left: 1px solid rgba(197,160,89,0.2); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .sidebar-header img { max-width: 150px; }
        .lessons-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .lesson-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .lesson-item:hover { background: rgba(197,160,89,0.1); }
        .lesson-item.active { background: var(--gold); color: black; font-weight: bold; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .details { padding: 40px; }
        .details h1 { color: var(--gold); margin: 0; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color:var(--gold)">دخول الطلاب</h2>
            <p>يرجى إدخال رمز الوصول الخاص بالأكاديمية</p>
            <input type="password" id="passCode" placeholder="الرمز">
            <br>
            <button onclick="checkAccess()">دخول</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="lessons-list" id="list">
            <div class="lesson-item active" onclick="play('https://res.cloudinary.com/dr3i6fqai/video/upload/f_auto,q_auto/v1778803781/intro.mov_mjsodb.mov', 'المقدمة والترحيب', 'أهلاً بكم في أكاديمية IELTS مع د. مصطفى مكاحلة', this)">
                <i class="fas fa-play-circle"></i>
                <span>1. المقدمة والترحيب</span>
            </div>
            </div>
    </aside>

    <main class="main-content">
        <div class="video-container">
            <video id="player" controls controlsList="nodownload">
                <source id="source" src="https://res.cloudinary.com/dr3i6fqai/video/upload/f_auto,q_auto/v1778803781/intro.mov_mjsodb.mov" type="video/mp4">
            </video>
        </div>
        <div class="details">
            <h1 id="title">المقدمة والترحيب</h1>
            <p id="desc">أهلاً بكم في أكاديمية IELTS مع د. مصطفى مكاحلة</p>
        </div>
    </main>

    <script>
        // وظيفة التحقق من الرمز (يمكنك تغيير 1234 لأي رمز تريد)
        function checkAccess() {
            const code = document.getElementById('passCode').value;
            if(code === '1234') { 
                document.getElementById('lock-screen').style.display = 'none';
            } else {
                alert('الرمز غير صحيح!');
            }
        }

        // وظيفة تشغيل الفيديو
        function play(url, title, desc, el) {
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('source').src = url;
            document.getElementById('title').innerText = title;
            document.getElementById('desc').innerText = desc;
            const v = document.getElementById('player');
            v.load(); v.play();
        }
    </script>
</body>
</html>
