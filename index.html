<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS التفاعلية - د. مصطفى</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --primary-dark: #000a14;
            --gold-matte: #c5a059;
            --gold-bright: #f1d279;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0; background-color: var(--primary-dark);
            font-family: 'Cairo', sans-serif; color: #e0e0e0;
        }

        /* تنسيق الهيدر الجديد لضمان الوضوح */
        header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #001225, transparent);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .logo-wrapper img {
            height: 65px; /* تحديد الارتفاع بدلاً من العرض يحافظ على الدقة */
            width: auto;
            image-rendering: -webkit-optimize-contrast;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .separator {
            font-size: 24px;
            color: var(--gold-matte);
            font-weight: 300;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .skills-nav {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0;
        }

        .skill-box {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 15px; padding: 20px 10px; cursor: pointer;
            text-align: center; transition: 0.3s;
        }

        .skill-box.active {
            background: rgba(197, 160, 89, 0.15);
            border-color: var(--gold-bright);
        }

        .content-panel {
            background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 25px; padding: 30px; display: none;
        }
        .content-panel.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1715725791/51talk_logo.png" alt="51Talk">
        <div class="separator">✕</div>
        <img src="https://res.cloudinary.com/dr3i6fqai/image/upload/v1715725791/ielts_logo.png" alt="IELTS">
    </div>
    <h2 style="color: var(--gold-bright); margin-top: 20px;">أكاديمية د. مصطفى IELTS</h2>
    <p style="color: var(--gold-matte);">منصة التعليم التفاعلي الذكية</p>
</header>

<div class="container">
    <div class="skills-nav">
        <div class="skill-box active" onclick="showTab('listening', this)">
            <i class="fas fa-headphones"></i><br>استماع
        </div>
        <div class="skill-box" onclick="showTab('reading', this)">
            <i class="fas fa-book-open"></i><br>قراءة
        </div>
        <div class="skill-box" onclick="showTab('writing', this)">
            <i class="fas fa-pen"></i><br>كتابة
        </div>
        <div class="skill-box" onclick="showTab('speaking', this)">
            <i class="fas fa-comments"></i><br>محادثة
        </div>
    </div>

    <div id="listening" class="content-panel active">
        <h3>دروس مهارة الاستماع</h3>
        <p>المحتوى المخصص لطلاب النخبة...</p>
    </div>
    <div id="reading" class="content-panel"><h3>دروس مهارة القراءة</h3></div>
    <div id="writing" class="content-panel"><h3>دروس مهارة الكتابة</h3></div>
    <div id="speaking" class="content-panel"><h3>دروس مهارة المحادثة</h3></div>
</div>

<script>
    function showTab(id, btn) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.skill-box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
