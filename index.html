<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Interactive | Premium Portal</title>
    <!-- مكتبة Plyr لتحويل شكل يوتيوب لمشغل احترافي -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #000b1e; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #d4af37; text-align: center; width: 90%; max-width: 800px; backdrop-filter: blur(10px); }
        h1 { color: #d4af37; }
        input { width: 80%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #001529; color: #fff; text-align: center; }
        button { padding: 12px 30px; background: #d4af37; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .video-wrapper { display: none; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        /* تخصيص لون المشغل ليناسب هويتك الذهبية */
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: rgba(212, 175, 55, 0.8); }
        .plyr--full-ui.plyr--video .plyr__control.plyr__tab-focus, .plyr--full-ui.plyr--video .plyr__control:hover, .plyr--full-ui.plyr--video .plyr__controls__item.plyr__control--pressed { background: #d4af37; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h1>IELTS Interactive</h1>
        <input type="password" id="pass" placeholder="أدخل كود الوصول">
        <br>
        <button onclick="access()">دخول</button>
    </div>

    <div id="videoSection" class="video-wrapper">
        <h2 id="title" style="color:#d4af37"></h2>
        <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
        <br>
        <button onclick="location.reload()" style="background:#222; color:#fff;">خروج</button>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    const player = new Plyr('#player', {
        settings: ['quality', 'speed'],
        youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1 }
    });

    function access() {
        const code = document.getElementById('pass').value;
        const db = {
            "IELTS-A1": { title: "تأسيس الاستماع A1", id: "s0b18s80Z-I" },
            "IELTS-PRO": { title: "احتراف القراءة PRO", id: "kb9d9fM27Ew" }
        };

        if (db[code]) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('videoSection').style.display = 'block';
            document.getElementById('title').innerText = db[code].title;
            player.source = {
                type: 'video',
                sources: [{ src: db[code].id, provider: 'youtube' }]
            };
        } else { alert("الكود خطأ!"); }
    }
</script>
</body>
</html>
