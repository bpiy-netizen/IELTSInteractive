<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية IELTS - د. مصطفى</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #999; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }
        .content-section { display: none; text-align: right; }
        .content-section.active { display: block; animation: fadeIn 0.5s; }
        .video-item { background: #f8f9fa; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s; }
        .video-item:hover { background: #eef2f7; transform: scale(1.01); }
        .player-container { margin-top: 25px; display: none; }
        video { width: 100%; border-radius: 10px; background: #000; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>أكاديمية IELTS الذكية</h1>
    <p>بوابة الدروس التفاعلية - د. مصطفى</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('listening')">الاستماع</button>
        <button class="tab-btn" onclick="openTab('reading')">القراءة</button>
        <button class="tab-btn" onclick="openTab('writing')">الكتابة</button>
        <button class="tab-btn" onclick="openTab('speaking')">المحادثة</button>
    </div>

    <div id="listening" class="content-section active">
        <h3>مهارة الاستماع (Listening)</h3>
        <div class="video-item" onclick="playVideo('L1', 'Lesson1')">
            <span>Lesson 1: Introduction to Listening</span>
            <span>▶</span>
        </div>
        <div class="video-item" onclick="playVideo('L1', 'Lesson2')">
            <span>Lesson 2: Sentence Completion</span>
            <span>▶</span>
        </div>
    </div>

    <div id="reading" class="content-section"><h3>قريباً: دروس القراءة</h3></div>
    <div id="writing" class="content-section"><h3>قريباً: دروس الكتابة</h3></div>
    <div id="speaking" class="content-section"><h3>قريباً: دروس المحادثة</h3></div>

    <div id="playerArea" class="player-container">
        <h4 id="nowPlaying"></h4>
        <video id="mainPlayer" controls playsinline></video>
    </div>
</div>

<script>
    function openTab(name) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function playVideo(folder, file) {
        const cloudName = "dr3i6fqai";
        const videoUrl = `https://res.cloudinary.com/${cloudName}/video/upload/f_auto,q_auto/${folder}/${file}`;
        const area = document.getElementById('playerArea');
        const player = document.getElementById('mainPlayer');
        area.style.display = "block";
        document.getElementById('nowPlaying').innerText = "عرض: " + file;
        player.src = videoUrl;
        player.load();
        player.play();
        area.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
